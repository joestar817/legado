name: Release Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
    steps:
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H)" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_KEY_STORE: ${{ secrets.RELEASE_KEY_STORE }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Release Apk Sign
        run: |
          if [ -z "$RELEASE_KEY_STORE" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ] || [ -z "$RELEASE_STORE_PASSWORD" ]; then
            echo "Release signing secrets are required."
            exit 1
          fi
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" >> gradle.properties
          echo RELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" >> gradle.properties
          echo RELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" >> gradle.properties
          echo RELEASE_STORE_FILE="./key.jks" >> gradle.properties
          echo "$RELEASE_KEY_STORE" | base64 --decode > "$GITHUB_WORKSPACE/app/key.jks"

      - name: Unify Version Name
        run: |
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSION }}\"" "$GITHUB_WORKSPACE/app/build.gradle" -i

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build With Gradle
        run: |
          echo "开始进行 app release 构建"
          chmod +x gradlew
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all

      - name: Organize the Files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/apk"
          cp -rf "$GITHUB_WORKSPACE"/app/build/outputs/apk/*/*/*.apk "$GITHUB_WORKSPACE/apk/"

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.app.release
          path: ${{ github.workspace }}/apk/*.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: legado_ng_${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body_path: ${{ github.workspace }}/CHANGELOG.md
          draft: false
          prerelease: false
          files: ${{ github.workspace }}/apk/legado_app_*.apk
